<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Infinite Racer</title>
    <style>
      *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
      html, body { width:100%; height:100%; overflow:hidden; background:#030308; }
      body { -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; }
      #root { width:100%; height:100%; }
      /* Range input style */
      input[type=range] { -webkit-appearance:none; height:4px; border-radius:2px; background:rgba(0,200,255,0.2); outline:none; }
      input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:#00cfff; cursor:pointer; }
    </style>
    <!-- AdinPlay: replace YOUR-PUBLISHER-ID -->
    <script>window.aiptag=window.aiptag||{cmd:{player:[]}};</script>
    <script async src="https://api.adinplay.com/libs/aiptag/pub/YOUR-PUBLISHER-ID/aip.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
